name: Package portability

on:
  pull_request:
    paths:
      - ".github/workflows/package-portability.yml"
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "switchyard/**"
      - "switchyard_rust/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/package-portability.yml"
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "switchyard/**"
      - "switchyard_rust/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  MATURIN_VERSION: "1.11.5"

jobs:
  source-dist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --locked
      - name: Build sdist
        run: uv run maturin sdist --out dist

  wheels:
    name: Wheel (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            manylinux_arch: x86_64
            smoke: true
          - label: linux-aarch64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            manylinux_arch: aarch64
            smoke: false
          - label: macos-x86_64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            smoke: true
          - label: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            smoke: true
          - label: windows-x86_64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            smoke: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup QEMU for Linux cross builds
        if: matrix.label == 'linux-aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Install maturin
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin==${MATURIN_VERSION}"
      - name: Install Rust target
        if: runner.os != 'Linux'
        shell: bash
        run: rustup target add "${{ matrix.rust_target }}"
      - name: Build manylinux wheel
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -e MATURIN_VERSION="${MATURIN_VERSION}" \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            "quay.io/pypa/manylinux2014_${{ matrix.manylinux_arch }}" \
            /bin/bash -lc '
              set -euxo pipefail
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              source "${HOME}/.cargo/env"
              PYTHON=/opt/python/cp312-cp312/bin/python
              "${PYTHON}" -m pip install --upgrade pip
              "${PYTHON}" -m pip install "maturin==${MATURIN_VERSION}"
              "${PYTHON}" -m maturin build \
                --release \
                --locked \
                --compatibility pypi \
                --out dist \
                --interpreter "${PYTHON}"
            '
      - name: Build native wheel
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m maturin build \
            --release \
            --locked \
            --compatibility pypi \
            --out dist \
            --target "${{ matrix.rust_target }}"
      - name: Smoke install native wheel on Python 3.12
        if: matrix.smoke
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import os
          import sys
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="switchyard-wheel-smoke-"))
          workspace = os.environ.get("GITHUB_WORKSPACE")
          sys.path = [entry for entry in sys.path if entry not in ("", workspace)]

          import switchyard
          import switchyard_rust
          from switchyard_rust import _switchyard_rust

          print("switchyard", switchyard.__version__)
          print("switchyard_rust", switchyard_rust.__file__)
          print("rust extension", _switchyard_rust.__name__)
          PY
      - uses: actions/setup-python@v5
        if: matrix.smoke
        with:
          python-version: "3.14"
      - name: Smoke install native wheel on Python 3.14
        if: matrix.smoke
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import os
          import sys
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="switchyard-wheel-smoke-"))
          workspace = os.environ.get("GITHUB_WORKSPACE")
          sys.path = [entry for entry in sys.path if entry not in ("", workspace)]

          import switchyard
          import switchyard_rust
          from switchyard_rust import _switchyard_rust

          print("switchyard", switchyard.__version__)
          print("switchyard_rust", switchyard_rust.__file__)
          print("rust extension", _switchyard_rust.__name__)
          PY
