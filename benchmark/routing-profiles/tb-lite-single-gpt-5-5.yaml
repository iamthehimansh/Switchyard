#
# Serve-backed single-model GPT-5.5 profile for Harbor Terminal-Bench Lite.
# Run with:
#   benchmark/run-baseline.sh \
#     --harbor-path benchmark/datasets/openthoughts-tblite-closed-book \
#     --routing-profiles benchmark/routing-profiles/tb-lite-single-gpt-5-5.yaml \
#     --model tb-lite-single-gpt-5-5
# Harbor uses openai/tb-lite-single-gpt-5-5; LiteLLM strips the provider
# prefix and sends this route key to Switchyard.

defaults:
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_secs: 600.0

routes:
  tb-lite-single-gpt-5-5:
    type: model
    target:
      model: openai/gpt-5.5
      format: responses
