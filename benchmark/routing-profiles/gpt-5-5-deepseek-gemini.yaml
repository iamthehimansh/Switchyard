#
# LLM-classifier GPT-5.5/DeepSeek/Gemini profile for Harbor Terminal-Bench Lite.
# Run with:
#   benchmark/run-baseline.sh \
#     --harbor-path benchmark/datasets/openthoughts-tblite-closed-book \
#     --routing-profiles benchmark/routing-profiles/gpt-5-5-deepseek-gemini.yaml \
#     --model switchyard

routes:
  switchyard:
    type: deterministic
    profile: coding_agent
    enable_stats: true
    fallback_target_on_evict: strong
    strong:
      model: openai/gpt-5.5
      api_key: ${OPENROUTER_API_KEY}
      base_url: https://openrouter.ai/api/v1
      format: responses
      timeout_secs: 600
      extra_body:
        reasoning_effort: high
    weak:
      model: deepseek/deepseek-v4-pro
      api_key: ${OPENROUTER_API_KEY}
      base_url: https://openrouter.ai/api/v1
      format: openai
      timeout_secs: 600
    classifier:
      model: google/gemini-3.5-flash
      api_key: ${OPENROUTER_API_KEY}
      base_url: https://openrouter.ai/api/v1
      timeout_secs: 30
      min_confidence: 0.0
      fail_open: true
      recent_turn_window: 4
