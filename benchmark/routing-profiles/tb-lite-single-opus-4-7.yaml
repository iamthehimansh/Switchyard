#
# Serve-backed single-model Opus 4.7 profile for Harbor Terminal-Bench Lite.
# Run with:
#   benchmark/run-baseline.sh \
#     --harbor-path benchmark/datasets/openthoughts-tblite-closed-book \
#     --routing-profiles benchmark/routing-profiles/tb-lite-single-opus-4-7.yaml \
#     --model tb-lite-single-opus-4-7
# Harbor uses openai/tb-lite-single-opus-4-7; LiteLLM strips the provider
# prefix and sends this route key to Switchyard.
#
# Note: provider support for agent sampling fields varies. If a provider rejects
# a field, strip it in the benchmark agent config before running a full pass.

defaults:
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_secs: 600.0

routes:
  tb-lite-single-opus-4-7:
    type: model
    target:
      model: anthropic/claude-opus-4.7
      format: openai
