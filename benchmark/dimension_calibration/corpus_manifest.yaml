# Calibration corpus for the DimensionCollector. Each entry points at one
# Harbor run; the extractor turns that run into a normalized stream of
# ScoredPrompt records the calibration runner consumes.
#
# Paths are RELATIVE TO THE SWITCHYARD REPO ROOT. The runner resolves them
# against the repo so the same manifest works on any machine that has the
# referenced Harbor runs in the same place.
#
# Switchyard writes Harbor TBLite runs under benchmark/tb_runs/ (gitignored)
# via `switchyard verify --route-profile <profile> --model <route>`. Each run
# lands at:
#
#   benchmark/tb_runs/<run-name>/jobs/<run-name>/<task>__<suffix>/agent/
#     episode-0/prompt.txt
#     episode-1/prompt.txt
#     ...
#
# Point each entry below at the inner `jobs/<run-name>/` directory.
#
# To add your own run:
#   1. produce a Harbor run (`switchyard verify ...`)
#   2. add an entry below with a unique `id`, a meaningful `source` label,
#      and the path to its `jobs/<run-name>/` directory
#   3. `uv run python benchmark/dimension_calibration/run.py`
#
# The per-dimension report under report/ is overwritten on every run.

runs:
  # Example entries — replace the paths with your local Harbor run directories.
  # The runner skips entries whose path does not exist, so unused stubs are
  # harmless.

  - id: cascade-strong-default-deepseek
    extractor: harbor
    source: cascade-strong-default-deepseek
    path: "benchmark/tb_runs/tb-lite-cascade-strong-default-deepseek/jobs/tb-lite-cascade-strong-default-deepseek"
    label: "Cascade — cascade_strong_default picker, Opus + DeepSeek"

  - id: cascade-strong-default-nemotron
    extractor: harbor
    source: cascade-strong-default-nemotron
    path: "benchmark/tb_runs/tb-lite-cascade-strong-default-nemotron/jobs/tb-lite-cascade-strong-default-nemotron"
    label: "Cascade — cascade_strong_default picker, Opus + Nemotron"

  - id: all-opus
    extractor: harbor
    source: all-opus
    path: "benchmark/tb_runs/tb-lite-single-opus-4-7/jobs/tb-lite-single-opus-4-7"
    label: "All-Opus baseline"

  - id: all-deepseek
    extractor: harbor
    source: all-deepseek
    path: "benchmark/tb_runs/tb-lite-single-deepseek-v4-pro/jobs/tb-lite-single-deepseek-v4-pro"
    label: "All-DeepSeek baseline"
