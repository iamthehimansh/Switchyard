# Switchyard v2 profile config mixing a Rust profile and a Python-defined one.
#
# Load it in-process with the Python API:
#
#   from switchyard import load_profiles
#   profiles = load_profiles("examples/python_profile.yaml")
#   await profiles["smart"].run(ProfileInput(request, metadata))
#
# Or serve both profile ids over the same HTTP API paths:
#
#   switchyard serve --config examples/python_profile.yaml
#
# `direct` is a Rust passthrough; `smart` is the shipped Python `header-routing`
# profile (switchyard/lib/profiles/header_routing.py), which picks a tier from the
# x-switchyard-tier request header and delegates the call to a Rust target
# backend. Both share the same resolved targets.

endpoints:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}

targets:
  strong:
    endpoint: openrouter
    model: anthropic/claude-opus-4.7
    format: openai
  weak:
    endpoint: openrouter
    model: moonshotai/kimi-k2.6
    format: openai

profiles:
  direct:
    type: passthrough
    target: weak

  smart:
    type: header-routing
    strong: strong
    weak: weak
