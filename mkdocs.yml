site_name: Switchyard
site_description: Typed, composable LLM routing and format translation for Python
repo_url: https://github.com/NVIDIA-NeMo/Switchyard
repo_name: NVIDIA-NeMo/Switchyard
edit_uri: edit/main/docs/
extra:
  source_ref: !ENV [MKDOCS_SOURCE_REF, main]
copyright: "Copyright &copy; 2025-2026 NVIDIA Corporation"

docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

hooks:
  - mkdocs_hooks.py

nav:
  - Home: index.md
  - Get Started:
      - Getting Started: getting_started.md
      - Known Issues in 0.1.0: known_issues.md
  - Guides:
      - Agent Launchers: guides/agent_launchers.md
  - Concepts:
      - Architecture: architecture.md
  - Routing:
      - Overview: routing_algorithms/overview.md
      - Random Routing: routing_algorithms/random_routing.md
      - LLM Classifier Routing: routing_algorithms/llm_classifier_routing.md
      - Sticky Routing: routing_algorithms/sticky_routing.md
      - Cascade Routing: routing_algorithms/cascade_routing.md
  - Operations:
      - Context-Window Handling: operations/context_window.md
  - Reference:
      - CLI Reference: cli_reference.md

exclude_docs: |
  internal/**
  research/**
  local_models.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [docs]
      check_paths: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/nvidia.css
